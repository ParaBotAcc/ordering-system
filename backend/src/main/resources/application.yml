spring:
  application:
    name: ordering-backend

  profiles:
    active: demo

server:
  port: 8080

# 飞书配置（Demo 阶段暂不启用）
feishu:
  app-id: cli_aa9c0e8b7dbe1cbc
  app-secret: cqBOSTbIM87RndRLqU1sseh8n4ZD0qqT  # TODO 替换为真实 app-secret
  bitable:
    table-app-token: BDSBbWQFma4i2TsWFpDcUA8tnBh
    menu-table-id: tblWL4oVA5lnkWjH
    order-table-id: tblxo10F957kfmeU
    table-table-id: tbl0neFXmewZYPXr

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ordering: DEBUG
---
# Demo 配置：H2 内存数据库，内嵌缓存
spring:
  config:
    activate:
      on-profile: demo
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:ordering;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: simple
---
# 生产配置：MySQL + Redis
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/ordering?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ordering
    password: ordering123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
